<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-cyan: #00ffff;
            --neon-pink: #ff00ff;
            --neon-yellow: #ffaa00;
            --bg-black: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg-black);
            color: var(--neon-green);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 0, 180, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 180, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(0, 255, 100, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: bgPulse 10s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--neon-green);
            text-shadow: 
                0 0 5px var(--neon-green),
                0 0 10px var(--neon-green),
                0 0 20px var(--neon-pink),
                0 0 40px var(--neon-pink);
        }

        h2 {
            font-size: 1.5rem;
            margin: 30px 0 15px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            border-bottom: 1px solid var(--neon-cyan);
            padding-bottom: 10px;
        }

        h3 {
            font-size: 1.2rem;
            margin: 20px 0 10px;
            color: var(--neon-yellow);
            text-shadow: 0 0 8px var(--neon-yellow);
        }

        p {
            margin: 10px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td {
            border: 1px solid var(--neon-green);
            padding: 10px;
            text-align: left;
            box-shadow: 0 0 5px var(--neon-green);
        }

        th {
            color: var(--neon-yellow);
            text-shadow: 0 0 5px var(--neon-yellow);
        }

        .emoji {
            font-family: sans-serif;
        }

        .back-link {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            background: rgba(0, 0, 0, 0.8);
        }

        .back-link a {
            color: var(--neon-green);
            text-decoration: none;
            text-shadow: 0 0 5px var(--neon-green);
        }

        .back-link a:hover {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .note {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px dashed var(--neon-green);
            font-size: 0.9rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 3px var(--neon-cyan);
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="container">

            <p>报告自动生成 by OpenClaw AI 量化分析系统</p>
        </div>
    </div>
</body>
</html>
