<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --color-primary: #ff3d00;
            --color-accent: #00e5ff;
            --text-primary: #ffffff;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; max-width: 600px; padding: 20px; }
        .error-code { font-family: var(--font-display); font-size: 8rem; font-weight: 900; background: linear-gradient(135deg, var(--color-primary), var(--color-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .error-title { font-family: var(--font-display); font-size: 2rem; margin-bottom: 16px; }
        .error-desc { color: rgba(255, 255, 255, 0.6); margin-bottom: 32px; }
        .back-btn { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, var(--color-primary), #ff6f00); border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; text-decoration: none; }
        .back-btn:hover { transform: translateY(-3px); box-shadow: 0 0 30px rgba(255, 61, 0, 0.5); }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1 class="error-title">页面未找到</h1>
        <p class="error-desc">抱歉，您访问的页面不存在或正在建设中</p>
        <a href="index.html" class="back-btn">返回首页</a>
    </div>
</body>
</html>
