<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sing- 黄页主站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: #000;
            color: #00ff41;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 赛博朋克背景效果 */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 0, 180, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 180, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(0, 255, 100, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: bgPulse 10s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* 网格线效果 */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* 霓虹标题 */
        header {
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #00ff41;
            text-shadow: 
                0 0 5px #00ff41,
                0 0 10px #00ff41,
                0 0 20px #ff00ff,
                0 0 40px #ff00ff;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 5px #00ff41, 0 0 10px #00ff41, 0 0 20px #ff00ff, 0 0 40px #ff00ff; }
            25% { text-shadow: -2px 0 #ff00ff, 2px 2px #00ff41; }
            50% { text-shadow: 2px -2px #00ffff, -2px 2px #ff00ff; }
            75% { text-shadow: -2px 0 #00ff41, 2px -2px #ff00ff; }
        }

        .subtitle {
            margin-top: 15px;
            font-size: 1rem;
            color: #00ffff;
            letter-spacing: 4px;
            opacity: 0.8;
        }

        /* 页签容器 */
        .tabs-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* 页签导航 */
        .tabs-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 16px 32px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff41;
            color: #00ff41;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .tab-btn:hover {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.6);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: rgba(0, 255, 65, 0.2);
            border-color: #ff00ff;
            color: #ff00ff;
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.7);
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 65, 0.3), transparent);
            transition: left 0.5s;
        }

        .tab-btn:hover::before {
            left: 100%;
        }

        /* 页签内容 */
        .tabs-content {
            position: relative;
            min-height: 500px;
        }

        .tab-content {
            display: none;
            padding: 40px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff41;
            box-shadow: 
                0 0 20px rgba(0, 255, 65, 0.3),
                inset 0 0 40px rgba(0, 255, 65, 0.05);
            border-radius: 8px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab-content.active {
            display: block;
        }

        .tab-content h2 {
            font-size: 2rem;
            margin-bottom: 25px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            letter-spacing: 4px;
        }

        .tab-content p {
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 20px;
            color: #00ff41;
            opacity: 0.9;
        }

        /* 发光边框动画 */
        .glow-border {
            position: relative;
        }

        .glow-border::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ff41, #00ffff, #ff00ff, #00ff41);
            border-radius: 10px;
            z-index: -1;
            animation: borderGlow 3s linear infinite;
            background-size: 400%;
            filter: blur(5px);
            opacity: 0.7;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 占位内容样式 */
        .placeholder-box {
            border: 1px dashed #00ff41;
            padding: 30px;
            text-align: center;
            margin-top: 20px;
            background: rgba(0, 255, 65, 0.05);
        }

        .placeholder-text {
            color: #00ffff;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 30px;
            margin-top: 60px;
            border-top: 1px solid rgba(0, 255, 65, 0.3);
        }

        .footer-text {
            color: #00ff41;
            opacity: 0.6;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* 扫描线效果 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 65, 0.6);
            box-shadow: 0 0 10px #00ff41;
            animation: scanline 6s linear infinite;
            z-index: 999;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
                letter-spacing: 4px;
            }
            .tabs-nav {
                flex-direction: column;
            }
            .tab-content {
                padding: 20px;
            }
            .tab-content h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>
    <div class="scanline"></div>

    <header>
        <h1>SING-</h1>
        <div class="subtitle">CYBERPUNK YELLOW PAGE NETWORK</div>
    </header>

    <div class="tabs-container">
        <div class="tabs-nav glow-border">
            <button class="tab-btn active" onclick="switchTab('game-audio')">游戏音频</button>
            <button class="tab-btn" onclick="switchTab('finance')">金融投资</button>
            <button class="tab-btn" onclick="switchTab('ecommerce')">跨境电商</button>
        </div>

        <div class="tabs-content">
            <div id="game-audio" class="tab-content active">
                <h2>[GAME AUDIO]</h2>
                <p>游戏音频资源板块正在建设中...</p>
                <div class="placeholder-box">
                    <div class="placeholder-text">>>> 等待内容录入 <<<</div>
                </div>
            </div>

            <div id="finance" class="tab-content">
                <h2>[FINANCE INVESTMENT]</h2>
                <div class="daily-news-section">
                    <h3 style="color: #ff00ff; text-shadow: 0 0 8px #ff00ff; margin: 20px 0 15px 0; letter-spacing: 3px;">■ 每日资讯</h3>
                    
                    <!-- 按日期分组 -->
                    <div class="date-group" style="margin: 20px 0; padding: 20px; border: 2px solid #00ff41; background: rgba(0, 255, 65, 0.08); border-radius: 8px;">
                        <div class="date-title" style="color: #00ffff; font-size: 1.3rem; margin-bottom: 18px; letter-spacing: 3px; text-shadow: 0 0 6px #00ffff;">
                            ▶ 2026-03-18
                        </div>
                        <div class="report-list" style="margin-left: 15px;">
                            <div class="report-item" style="margin: 12px 0; padding: 12px; border: 1px solid #00ff41; background: rgba(0, 255, 65, 0.05); border-radius: 5px;">
                                <div class="report-name" style="color: #00ffff; font-size: 1.05rem; margin-bottom: 8px; letter-spacing: 2px;">早盘早报</div>
                                <div class="report-link" style="margin-top: 8px;">
                                    <a href="daily/20260318/morning.html" style="color: #00ff41; text-decoration: none; border-bottom: 1px dashed #00ff41; letter-spacing: 2px;" onmouseover="this.style.color='#ff00ff'; this.style.borderColor='#ff00ff';" onmouseout="this.style.color='#00ff41'; this.style.borderColor='#00ff41';">>>> 查看完整早报 <<<</a>
                                </div>
                            </div>
                            <div class="report-item" style="margin: 12px 0; padding: 12px; border: 1px solid #00ff41; background: rgba(0, 255, 65, 0.05); border-radius: 5px;">
                                <div class="report-name" style="color: #00ffff; font-size: 1.05rem; margin-bottom: 8px; letter-spacing: 2px;">收盘复盘</div>
                                <div class="report-link" style="margin-top: 8px;">
                                    <a href="daily/20260318/close.html" style="color: #00ff41; text-decoration: none; border-bottom: 1px dashed #00ff41; letter-spacing: 2px;" onmouseover="this.style.color='#ff00ff'; this.style.borderColor='#ff00ff';" onmouseout="this.style.color='#00ff41'; this.style.borderColor='#00ff41';">>>> 查看完整复盘 <<<</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div style="margin-top: 40px;">
                    <p>更多金融投资分析内容持续更新中...</p>
                </div>
            </div>

            <div id="ecommerce" class="tab-content">
                <h2>[CROSS-BORDER ECOMMERCE]</h2>
                <p>跨境电商运营板块正在建设中...</p>
                <div class="placeholder-box">
                    <div class="placeholder-text">>>> 等待内容录入 <<<</div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-text">© 2026 SING- NETWORK // NEON CYBERPUNK</div>
    </footer>

    <script>
        function switchTab(tabId) {
            // 移除所有active状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // 添加active状态
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // 添加随机霓虹闪烁效果
        setInterval(() => {
            const header = document.querySelector('h1');
            const randomDelay = Math.random() * 1000;
            setTimeout(() => {
                header.style.opacity = 0.8 + Math.random() * 0.2;
            }, randomDelay);
        }, 2000);
    </script>
</body>
</html>
